<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Harvest2Hotel</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <i class="fas fa-leaf"></i>
                    <span>Harvest2<span class="highlight">Hotel</span></span>
                </div>
                <h2>Create Account</h2>
                <p>Join the B2B food marketplace</p>
            </div>
            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Create a password" required>
                </div>
                <div class="form-group">
                    <label>Company Name</label>
                    <input type="text" id="companyName" placeholder="Your company/business name" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="phone" placeholder="Contact number" required>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <textarea id="address" rows="3" placeholder="Full address"></textarea>
                </div>
                <div class="form-group">
                    <label>Account Type</label>
                    <select id="userType" required>
                        <option value="hotel">Hotel Owner</option>
                        <option value="manufacturer">Food Manufacturer</option>
                    </select>
                </div>
                <button type="submit" class="btn-auth">Register <i class="fas fa-user-plus"></i></button>
            </form>
            <p class="auth-footer">Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
