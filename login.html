<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Harvest2Hotel</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <i class="fas fa-leaf"></i>
                    <span>Harvest2<span class="highlight">Hotel</span></span>
                </div>
                <h2>Welcome Back</h2>
                <p>Login to your account</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <div class="form-group">
                    <label>Account Type</label>
                    <select id="userType" required>
                        <option value="hotel">Hotel Owner</option>
                        <option value="manufacturer">Manufacturer</option>
                    </select>
                </div>
                <button type="submit" class="btn-auth">Login <i class="fas fa-arrow-right"></i></button>
            </form>
            <p class="auth-footer">Don't have an account? <a href="register.html">Sign up</a></p>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
